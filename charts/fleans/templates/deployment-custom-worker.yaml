{{- if .Values.customWorker.enabled }}
{{- /*
Custom-worker silo: hosts user-written custom-task plugins (the
Fleans.CustomWorkerHost worked-example deployable). No Service by design —
exact same rationale as deployment-worker.yaml: [StatelessWorker] grains
called via Orleans clustering, no inbound HTTP from outside the cluster.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fleans.fullname" . }}-custom-worker
  labels:
    {{- include "fleans.labels" . | nindent 4 }}
    app.kubernetes.io/component: custom-worker
spec:
  replicas: {{ .Values.customWorker.replicas }}
  selector:
    matchLabels:
      {{- include "fleans.selectorLabels" (dict "ctx" . "component" "custom-worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fleans.selectorLabels" (dict "ctx" . "component" "custom-worker") | nindent 8 }}
      {{- with .Values.customWorker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: fleans-custom-worker
          image: {{ include "fleans.imageRef" (dict "ctx" . "repo" .Values.image.api.repository) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: Fleans__Role
              value: "Worker"
            {{- include "fleans.commonEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.customWorker.resources | nindent 12 }}
      {{- with .Values.customWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.customWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.customWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
