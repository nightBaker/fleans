# Default values for the fleans Helm chart.
# Override on the helm install command line via --set or -f my-values.yaml.

# -----------------------------------------------------------------------------
# Container images
# -----------------------------------------------------------------------------
# `Fleans.Worker` is a library hosted by `Fleans.Api`; both the silo (Core role)
# and worker silos (Worker role) run the same `fleans-api` image with a
# different Fleans__Role env var. There is no separate `fleans-worker` image.
image:
  pullPolicy: IfNotPresent
  # Tag defaults to the chart's appVersion when left empty.
  tag: ""
  api:
    repository: ghcr.io/nightbaker/fleans-api
  web:
    repository: ghcr.io/nightbaker/fleans-web
  mcp:
    repository: ghcr.io/nightbaker/fleans-mcp

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# Workloads
# -----------------------------------------------------------------------------
# Orleans Core silo (hosts coordinator grains: WorkflowInstance etc.).
core:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  service:
    type: ClusterIP
    port: 8080
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Orleans Worker silo (hosts [StatelessWorker] grains: ScriptExecutorGrain etc.).
# Disabled by default — Combined silos host worker grains too. Enable to run
# worker silos on dedicated nodes (e.g. cheaper / spot instances).
worker:
  enabled: false
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Custom-worker silo (hosts user-written custom-task plugins via the
# Fleans.CustomWorkerHost worked-example deployable). Disabled by default —
# enable when shipping `<bpmn:serviceTask type="...">` plugins.
customWorker:
  enabled: false
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Blazor Server admin UI.
web:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8080
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# MCP server (for AI agent integration).
mcp:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  service:
    type: ClusterIP
    port: 5200
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Ingress (optional, for exposing the Web UI publicly)
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: fleans.example.com
  tls:
    enabled: false
    secretName: ""

# -----------------------------------------------------------------------------
# Persistence — choose Sqlite (in-pod, ephemeral) or Postgres
# -----------------------------------------------------------------------------
persistence:
  # Sqlite | Postgres
  # NOTE: Sqlite is for local-dev parity with `dotnet run --project Fleans.Aspire`
  # and is NOT supported by this chart out of the box. To run with Sqlite you
  # must add a writable volume (PVC or emptyDir, single-replica only) and set
  # FLEANS_SQLITE_CONNECTION + FLEANS_QUERY_CONNECTION via `extraEnv`. Postgres
  # is the recommended production path.
  provider: Postgres

# Postgres dependency. When postgres.enabled=true the chart provisions an
# in-cluster StatefulSet. When false, set persistence.provider=Postgres and
# supply external connection strings via env (extraEnv on each workload) or
# bake them into a values overlay.
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16"
  database: fleans
  username: fleans
  # Empty = chart generates a random password into a Secret on first install.
  # Set explicitly for reproducible installs (e.g. GitOps).
  password: ""
  # Set to reference an existing Secret with key `postgres-password`. If set,
  # `password` above is ignored.
  existingSecret: ""
  service:
    port: 5432
  persistentVolume:
    enabled: true
    size: 8Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# -----------------------------------------------------------------------------
# Redis dependency (Orleans clustering + grain storage; always required).
# -----------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  service:
    port: 6379
  persistentVolume:
    enabled: false
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

# -----------------------------------------------------------------------------
# Authentication (OIDC for the Web admin UI, JWT bearer for Fleans.Mcp).
# Fleans.Mcp refuses to start in Production with an empty `authority`
# (since #709); set `appEnvironment` to "Staging" for a deliberate
# unauthenticated deployment, or supply `authority`.
# -----------------------------------------------------------------------------
auth:
  authority: ""
  clientId: ""
  # Reference an existing Secret with key `client-secret` instead of inlining.
  clientSecretExistingSecret: ""
  # Or inline (NOT recommended for production — use existingSecret).
  clientSecret: ""
  # JWT audience claim for Fleans.Mcp tokens.
  mcpAudience: "fleans-mcp"

# -----------------------------------------------------------------------------
# ASP.NET Core environment passed via ASPNETCORE_ENVIRONMENT. Default
# "Production" — Fleans.Mcp refuses to start in Production without
# `auth.authority`. Override to "Staging" for an unauthenticated install.
# -----------------------------------------------------------------------------
appEnvironment: "Production"

# -----------------------------------------------------------------------------
# Streaming (Orleans Streams; defaults to Redis to match the engine default and
# reuse the chart-bundled Redis instance for both PubSubStore and streams).
# -----------------------------------------------------------------------------
streaming:
  # Memory | Redis | Kafka | AzureQueue (case-insensitive)
  # WARNING: Memory is single-silo debug-only — DO NOT use in multi-silo deployments.
  provider: Redis
  redis:
    # Orleans stream parallelism — pulling-agent count per cluster.
    # Default 8 matches the engine default in FleanStreamingExtensions.ReadRedisTotalQueueCount.
    totalQueueCount: 8
  kafka:
    # Comma-separated brokers list, e.g. "kafka.kafka.svc:9092"
    brokers: ""
    # Orleans stream parallelism — pulling-agent count per cluster.
    # Default 8 matches the engine default in KafkaStreamingOptions.QueueCount.
    queueCount: 8
  azureQueue:
    # Azurite or Azure Storage account connection string.
    # Inline value here for simplicity; for production use the existingSecret
    # pattern (follow-up tracked separately).
    connectionString: ""

# -----------------------------------------------------------------------------
# Common pod settings
# -----------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# Add custom env vars to ALL fleans workloads (api/web/mcp). Use this for
# Postgres connection-string overrides when postgres.enabled=false.
extraEnv: []
# - name: ConnectionStrings__fleans
#   value: "Host=my-external-pg;Port=5432;Database=fleans;Username=fleans;Password=..."
